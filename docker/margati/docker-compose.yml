# Margati production HA stack
#
# Architecture:
#   Client -> mineru-router:8000 -> healthy mineru-api worker(s)
#
# Single-node: one GPU worker behind the router (model preloaded, auto-restart).
# Multi-node:  add more mineru-api workers and extra --upstream-url flags on the router.
#
# Start:
#   docker compose -f docker/margati/docker-compose.yml up -d --build
#
# Smoke test:
#   ./docker/margati/test.sh /path/to/test.pdf

name: margati-mineru

x-mineru-api-common: &mineru-api-common
  image: margati/mineru-api:latest
  restart: unless-stopped
  init: true
  stop_grace_period: 60s
  environment: &mineru-api-env
    MINERU_MODEL_SOURCE: local
    MINERU_TOOLS_CONFIG_JSON: /etc/mineru/mineru.json
    MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-2}
    MINERU_API_TASK_RETENTION_SECONDS: ${MINERU_API_TASK_RETENTION_SECONDS:-86400}
    MINERU_LOG_LEVEL: ${MINERU_LOG_LEVEL:-INFO}
  volumes:
    - ${MINERU_MODELS_DIR:-/workspace/mineru_models}:/models:ro
    - ${MINERU_CONFIG_FILE:-./mineru.json}:/etc/mineru/mineru.json:ro
    - mineru-output:/var/lib/mineru/output
  ulimits:
    memlock: -1
    stack: 67108864
  ipc: host
  shm_size: "16gb"
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0"]
            capabilities: [gpu]

services:
  mineru-api:
    <<: *mineru-api-common
    build:
      context: ../..
      dockerfile: docker/margati/Dockerfile
    container_name: margati-mineru-api
    expose:
      - "8000"
    environment:
      <<: *mineru-api-env
      MINERU_API_OUTPUT_ROOT: /var/lib/mineru/output
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --enable-vlm-preload
      - "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"status\": \"healthy\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s

  mineru-router:
    image: margati/mineru-api:latest
    container_name: margati-mineru-router
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    depends_on:
      mineru-api:
        condition: service_healthy
    ports:
      - "${MINERU_PUBLIC_PORT:-8000}:8000"
    environment:
      MINERU_MODEL_SOURCE: local
      MINERU_TOOLS_CONFIG_JSON: /etc/mineru/mineru.json
      MINERU_LOG_LEVEL: ${MINERU_LOG_LEVEL:-INFO}
    entrypoint: ["mineru-router"]
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --local-gpus
      - none
      - --upstream-url
      - http://mineru-api:8000
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"status\": \"healthy\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mineru-output:
